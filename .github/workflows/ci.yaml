name: My First CI Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: ci-build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run test
        run: npm test